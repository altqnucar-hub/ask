<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kalp Oyunu 💙</title>

<style>
body{
margin:0;
overflow:hidden;
background:#cfe8ff;
font-family:Arial;
}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:20px;
z-index:10;
color:#1b2a4a;
}

#end{
position:absolute;
top:40%;
width:100%;
text-align:center;
font-size:26px;
display:none;
z-index:10;
color:#0b1c3a;
padding:20px;
}

#controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:grid;
grid-template-columns:60px 60px 60px;
grid-template-rows:60px 60px;
gap:10px;
z-index:20;
}

.btn{
background:white;
border-radius:12px;
font-size:24px;
display:flex;
justify-content:center;
align-items:center;
user-select:none;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.empty{visibility:hidden;}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">💙 0 / 8</div>
<div id="end"></div>

<div id="controls">
<div class="empty"></div>
<div class="btn" id="up">⬆️</div>
<div class="empty"></div>

<div class="btn" id="left">⬅️</div>
<div class="btn" id="down">⬇️</div>
<div class="btn" id="right">➡️</div>
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let player={
x:canvas.width/2,
y:canvas.height/2,
speed:4
};

let hearts=[];
let score=0;

let moveDir={x:0,y:0};

const ui=document.getElementById("ui");
const end=document.getElementById("end");
const music=document.getElementById("music");

let rainHearts=[];
let rainActive=false;
let zoom=1;
let zoomActive=false;

// kalpler
for(let i=0;i<8;i++){
hearts.push({
x:Math.random()*2000-1000,
y:Math.random()*2000-1000,
collected:false
});
}

// kontrol
function hold(id,x,y){
const b=document.getElementById(id);

b.addEventListener("touchstart",()=>{
moveDir.x=x;
moveDir.y=y;
});

b.addEventListener("touchend",()=>{
moveDir.x=0;
moveDir.y=0;
});

b.addEventListener("mousedown",()=>{
moveDir.x=x;
moveDir.y=y;
});

b.addEventListener("mouseup",()=>{
moveDir.x=0;
moveDir.y=0;
});
}

hold("left",-1,0);
hold("right",1,0);
hold("up",0,-1);
hold("down",0,1);

function move(){
player.x += moveDir.x*player.speed;
player.y += moveDir.y*player.speed;

player.x=Math.max(0,Math.min(canvas.width,player.x));
player.y=Math.max(0,Math.min(canvas.height,player.y));
}

function drawMap(){
ctx.fillStyle="#bfe3a8";
ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawPlayer(){
ctx.fillStyle="#f2c9a0";
ctx.fillRect(player.x-15,player.y-15,30,30);

ctx.fillStyle="#5d9c59";
ctx.fillRect(player.x-18,player.y+15,36,25);

// gözlük
ctx.strokeStyle="black";
ctx.strokeRect(player.x-12,player.y-8,10,8);
ctx.strokeRect(player.x+2,player.y-8,10,8);
}

function drawHearts(){
hearts.forEach(h=>{
if(!h.collected){
ctx.font="26px Arial";
ctx.fillText("💙",h.x,h.y);
}
});
}

function drawRain(){
if(!rainActive) return;

rainHearts.forEach(h=>{
h.y += h.speed;
ctx.font="20px Arial";
ctx.fillText("💙",h.x,h.y);
});
}

function spawnRain(){
for(let i=0;i<150;i++){
rainHearts.push({
x:Math.random()*canvas.width,
y:Math.random()*-canvas.height,
speed:2+Math.random()*4
});
}
rainActive=true;
}

function typeText(text){
end.innerText="";
let i=0;

let interval=setInterval(()=>{
end.innerText += text[i];
i++;
if(i>=text.length) clearInterval(interval);
},40);
}

function check(){

hearts.forEach(h=>{
if(!h.collected){

let dx=h.x-player.x;
let dy=h.y-player.y;

if(Math.sqrt(dx*dx+dy*dy)<25){
h.collected=true;
score++;
ui.innerText="💙 "+score+" / 8";
}
}
});

if(score===8 && !rainActive){

end.style.display="block";

music.play();
music.volume=0;

let fade=setInterval(()=>{
if(music.volume<1){
music.volume+=0.03;
}else clearInterval(fade);
},150);

spawnRain();
zoomActive=true;

typeText("Tüm kalpleri topladın… ama aslında hepsi sana aitti. Seni çok seviyorum 💙");
}
}

function move(){
player.x += moveDir.x*player.speed;
player.y += moveDir.y*player.speed;
}

function loop(){

drawMap();
drawHearts();
drawRain();
drawPlayer();

move();
check();

if(zoomActive && zoom<1.6){
zoom+=0.002;
canvas.style.transform=`scale(${zoom})`;
canvas.style.transformOrigin="center";
}

requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
